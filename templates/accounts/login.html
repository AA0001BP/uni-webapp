{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="auth-card-header text-center">
            <div class="auth-icon">🍹</div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="text-muted">Sign in to your ShakesRemix account.</p>
          </div>

          <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text auth-input-icon"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control auth-input"
                       placeholder="Your username" required autofocus>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text auth-input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control auth-input"
                       placeholder="Your password" required>
                <button type="button" class="btn auth-input-icon toggle-password" tabindex="-1">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-accent w-100 btn-lg">
              <i class="fas fa-right-to-bracket me-2"></i>Sign In
            </button>
          </form>

          <div class="auth-divider">
            <span>New to ShakesRemix?</span>
          </div>

          <a href="{% url 'register' %}" class="btn btn-outline-accent w-100">
            <i class="fas fa-user-plus me-2"></i>Create an Account
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
